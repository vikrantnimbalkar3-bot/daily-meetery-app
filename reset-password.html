<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — The Daily Meetery</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#292927;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{background:#1e1e1c;border-radius:16px;padding:32px 28px;width:100%;max-width:360px;display:flex;flex-direction:column;gap:16px}
    .logo{text-align:center}
    .logo .icon{font-size:44px}
    .logo .name{font-size:20px;font-weight:700;color:#fff;margin-top:6px}
    .logo .sub{font-size:13px;color:#A9B29E}
    label{font-size:12px;font-weight:600;color:#A9B29E;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:5px}
    .wrap{position:relative}
    input[type=password],input[type=text]{width:100%;padding:11px 40px 11px 14px;border-radius:8px;border:1px solid #3a3a38;background:#292927;color:#fff;font-size:15px;outline:none;transition:border .2s}
    input:focus{border-color:#D48631}
    .eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:#A9B29E;cursor:pointer;font-size:16px}
    .strength-bar{height:4px;border-radius:2px;background:#3a3a38;margin-top:5px;overflow:hidden}
    .strength-fill{height:100%;border-radius:2px;transition:width .3s,background .3s}
    .strength-label{font-size:11px;color:#A9B29E;margin-top:3px}
    .btn{background:#D48631;color:#fff;border:none;padding:13px;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;transition:background .2s;width:100%}
    .btn:hover{background:#b8711f}
    .btn:disabled{background:#555;cursor:not-allowed}
    .err{color:#ff6b6b;font-size:13px;min-height:16px;text-align:center}
    .ok{color:#4ade80;font-size:13px;text-align:center}
    .back{background:none;border:none;color:#D48631;font-size:13px;cursor:pointer;text-decoration:underline;text-align:center;width:100%}
    /* Expired / invalid state */
    #expired-view{display:none;text-align:center;gap:12px;flex-direction:column}
    #expired-view p{color:#A9B29E;font-size:14px;line-height:1.5}
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="icon">☕</div>
    <div class="name">Reset Password</div>
    <div class="sub">The Daily Meetery</div>
  </div>

  <!-- Reset form — shown when link is valid -->
  <div id="reset-view">
    <div>
      <label>New password</label>
      <div class="wrap">
        <input type="password" id="np" placeholder="••••••••" oninput="checkStr(this.value)">
        <button class="eye" onclick="tog('np',this)">👁</button>
      </div>
      <div class="strength-bar"><div class="strength-fill" id="sf" style="width:0%"></div></div>
      <div class="strength-label" id="sl"></div>
    </div>
    <div>
      <label>Confirm new password</label>
      <div class="wrap">
        <input type="password" id="cp" placeholder="••••••••">
        <button class="eye" onclick="tog('cp',this)">👁</button>
      </div>
    </div>
    <button class="btn" id="submit-btn" onclick="doReset()">Set new password</button>
    <div class="err" id="err"></div>
    <div class="ok"  id="ok"></div>
  </div>

  <!-- Expired / invalid link -->
  <div id="expired-view">
    <p>⏱ This reset link has expired or is invalid.</p>
    <p>Password reset links are valid for 1 hour.</p>
    <button class="btn" onclick="window.location='/owner'">← Back to login</button>
  </div>
</div>

<script>
const SURL = 'https://jxlalnsemmghxukapvxv.supabase.co';
const SKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp4bGFsbnNlbW1naHh1a2Fwdnh2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NjI5MzgsImV4cCI6MjA5MjMzODkzOH0.Wg7Ye-9ks-MpGUnq4X9OS_7RS_oaQkb1MvU0LNzzU0I';
const db = supabase.createClient(SURL, SKEY, {
  realtime: { enabled: false }, // Not needed on reset page
  auth: { persistSession: false },
});

// Supabase sends tokens in the URL hash after redirect:
// #access_token=...&type=recovery
// onAuthStateChange fires with event='PASSWORD_RECOVERY' when valid.
let sessionReady = false;

db.auth.onAuthStateChange(async (event, session) => {
  if (event === 'PASSWORD_RECOVERY') {
    // Valid recovery session — show the form
    sessionReady = true;
    document.getElementById('reset-view').style.display = '';
    document.getElementById('expired-view').style.display = 'none';
  } else if (event === 'SIGNED_IN' && !sessionReady) {
    // Already signed in — redirect to dashboard
    window.location = '/owner';
  }
});

// If no PASSWORD_RECOVERY event within 3s, the link is bad/expired
setTimeout(() => {
  if (!sessionReady) {
    document.getElementById('reset-view').style.display = 'none';
    document.getElementById('expired-view').style.display = 'flex';
  }
}, 3000);

async function doReset() {
  const np  = document.getElementById('np').value;
  const cp  = document.getElementById('cp').value;
  const err = document.getElementById('err');
  const ok  = document.getElementById('ok');
  const btn = document.getElementById('submit-btn');

  err.textContent = ''; ok.textContent = '';

  if (np.length < 8)  { err.textContent = 'Password must be at least 8 characters.'; return; }
  if (np !== cp)      { err.textContent = 'Passwords do not match.'; return; }

  btn.disabled = true; btn.textContent = 'Updating…';

  const { error } = await db.auth.updateUser({ password: np });

  btn.disabled = false; btn.textContent = 'Set new password';

  if (error) {
    err.textContent = error.message;
  } else {
    ok.textContent  = '✅ Password updated! Redirecting to dashboard…';
    document.getElementById('np').value = '';
    document.getElementById('cp').value = '';
    setTimeout(() => window.location = '/owner', 2000);
  }
}

function tog(id, btn) {
  const el = document.getElementById(id);
  el.type  = el.type === 'password' ? 'text' : 'password';
  btn.textContent = el.type === 'password' ? '👁' : '🙈';
}

function checkStr(pw) {
  const fill  = document.getElementById('sf');
  const label = document.getElementById('sl');
  if(!pw) { fill.style.width='0%'; label.textContent=''; return; }
  const has = {u:/[A-Z]/.test(pw),l:/[a-z]/.test(pw),n:/[0-9]/.test(pw),s:/[^A-Za-z0-9]/.test(pw)};
  const score = (pw.length>=8?1:0)+(pw.length>=12?1:0)+Object.values(has).filter(Boolean).length;
  if(score<=2)      { fill.style.cssText='width:33%;background:#ef4444'; label.textContent='Weak — add numbers or symbols'; }
  else if(score<=4) { fill.style.cssText='width:66%;background:#D48631'; label.textContent='Fair — try a longer password'; }
  else              { fill.style.cssText='width:100%;background:#4ade80'; label.textContent='Strong ✓'; }
}
</script>
</body>
</html>
